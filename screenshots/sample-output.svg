  <text x="36" y="195" font-family="Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Executable: 03-simple-backup-restore/backup_manager.sh</text>
  <text x="36" y="225" font-family="Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Executable: 03-simple-backup-restore/backup_now.sh</text>
