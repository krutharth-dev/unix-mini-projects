  <text x="36" y="410" font-family="Menlo, Consolas, monospace" font-size="19" fill="#c9d1d9">$ ./run_all_projects.sh</text>
  <text x="36" y="455" font-family="Menlo, Consolas, monospace" font-size="20" fill="#7ee787" font-weight="700">UNIX MINI PROJECTS LAUNCHER</text>
  <text x="36" y="500" font-family="Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">1. Process Monitoring and Alert System</text>
