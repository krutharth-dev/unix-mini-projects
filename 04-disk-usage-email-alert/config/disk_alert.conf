# ==========================================================
# Disk Usage Email Alert Configuration
# ==========================================================

# Alert threshold percentage.
# The script alerts when disk usage is greater than or equal to this value.
THRESHOLD=90

# Comma-separated mount points or paths to check.
# For macOS/Linux, "/" is the main disk/root filesystem.
MOUNT_POINTS="/"

# Email settings.
# Set EMAIL_ENABLED="yes" only if the mail command is configured on your system.
EMAIL_ENABLED="no"
EMAIL_TO="your_email@example.com"
EMAIL_SUBJECT="Disk Usage Alert"

# Desktop notification settings.
# macOS uses osascript. Linux may use notify-send if installed.
SEND_DESKTOP_NOTIFICATION="yes"
