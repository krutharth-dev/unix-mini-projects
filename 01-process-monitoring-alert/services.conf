# ==========================================================
# services.conf
# Format:
# ServiceName|ProcessPattern|RestartCommand
#
# Notes:
# - ServiceName is just the display name.
# - ProcessPattern is what pgrep searches for.
# - RestartCommand is optional.
# - Leave RestartCommand blank if you only want alert/logging.
# ==========================================================

Finder|Finder|
Dock|Dock|
Terminal|Terminal|

# Example macOS Homebrew services:
# Apache|httpd|brew services restart httpd
# MySQL|mysqld|brew services restart mysql

# Example Linux services:
# Apache Linux|apache2|sudo systemctl restart apache2
# MySQL Linux|mysql|sudo systemctl restart mysql

# Demo stopped service:
FakeService|this_process_should_not_exist|